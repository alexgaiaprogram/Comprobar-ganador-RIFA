<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Comprobador de Premios - Penya-Roja</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        text-align: center;

        background:
            radial-gradient(circle at 20% 20%, #00aa00 0%, #007700 40%, #003300 70%, #000000 100%),
            repeating-linear-gradient(
                45deg,
                rgba(255,255,255,0.05) 0px,
                rgba(255,255,255,0.05) 10px,
                rgba(0,0,0,0.15) 10px,
                rgba(0,0,0,0.15) 20px
            );
        background-blend-mode: overlay;
        color: white;

        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    #app {
        width: 100%;
        max-width: 600px;
        padding: 20px;
        box-sizing: border-box;
    }

    h1 {
        font-size: 7vw;
        margin-bottom: 20px;
        text-shadow: 3px 3px 6px #000;
    }

    input {
        padding: 15px;
        font-size: 28px;
        width: 200px;
        text-align: center;
        border-radius: 12px;
        border: 3px solid #ffffff;
        background: rgba(0,0,0,0.4);
        color: white;
        margin-bottom: 20px;
    }

    button {
        padding: 15px 30px;
        font-size: 28px;
        cursor: pointer;
        border: none;
        border-radius: 12px;
        background: #000;
        color: white;
        box-shadow: 3px 3px 8px #000;
        transition: 0.2s;
    }

    button:hover {
        background: #00aa00;
    }

    #resultado {
        margin-top: 30px;
        font-size: 7vw;
        font-weight: bold;
        padding: 20px;
        border-radius: 20px;
        background: rgba(0,0,0,0.5);
        border: 3px solid white;
        min-height: 80px;
    }

    #estadoCarga {
        font-size: 16px;
        margin-bottom: 10px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div id="app">

    <h1>Comprobador de Premios<br>Penya-Roja</h1>

    <div id="estadoCarga">Cargando lista de participantes...</div>

    <input type="number" id="numeroInput" placeholder="0000" min="1">

    <br>

    <button onclick="buscarParticipante()">Comprobar premio</button>

    <div id="resultado"></div>

</div>

<script>
let baseDatos = [];
let cargado = false;

// Cargar CSV automáticamente
fetch("participantes.csv")
    .then(res => res.text())
    .then(texto => {
        const lineas = texto.trim().split(/\r?\n/);
        if (lineas.length === 0) return;

        // Detectar separador: ; o ,
        const cabecera = lineas[0];
        const separador = cabecera.includes(";") ? ";" : ",";

        // Quitar cabecera
        lineas.shift();

        baseDatos = lineas
            .map(l => l.trim())
            .filter(l => l.length > 0)
            .map(l => {
                const partes = l.split(separador);
                const numero = parseInt(partes[0].trim(), 10);
                const participante = (partes[1] || "").trim();
                return { numero, participante };
            });

        cargado = true;
        document.getElementById("estadoCarga").innerText = "Lista cargada correctamente.";
    })
    .catch(err => {
        console.error(err);
        document.getElementById("estadoCarga").innerText = "Error al cargar participantes.csv";
    });

function buscarParticipante() {
    const resultado = document.getElementById("resultado");
    const input = document.getElementById("numeroInput");

    if (!cargado) {
        resultado.innerHTML = "⏳ La lista aún no se ha cargado. Espera un momento.";
        return;
    }

    const numeroRaw = input.value;

    if (!numeroRaw || parseInt(numeroRaw) < 1) {
        resultado.innerHTML = "Introduce un número válido";
        return;
    }

    const numeroBuscado = parseInt(numeroRaw, 10);

    const encontrado = baseDatos.find(r => r.numero === numeroBuscado);

    if (encontrado) {
        resultado.innerHTML = `🎉 Número ${numeroBuscado}<br>👤 Participante: <b>${encontrado.participante}</b>`;
    } else {
        resultado.innerHTML = `❌ El número ${numeroBuscado} no está en la lista`;
    }

    // ✔ LIMPIAR CAMPO TRAS COMPROBAR
    input.value = "";
}
</script>

</body>
</html>
